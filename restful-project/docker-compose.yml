services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: testdb
      MYSQL_USER: myuser
      MYSQL_PASSWORD: userpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # init.sql을 초기화 디렉터리에 넣으면 최초 기동 시 자동 실행됨
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      # MySQL이 실제로 응답 가능한 상태인지 확인
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    container_name: go-server
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: myuser
      DB_PASSWORD: userpassword
      DB_NAME: testdb
      PORT: "8080"
    depends_on:
      mysql:
        # MySQL이 healthy 상태가 된 다음에 서버를 띄움
        condition: service_healthy

volumes:
  mysql_data:
